<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siplora — Staff Login</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1208 50%, #0d0d0d 100%);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* Floating food images */
    .food-img {
      position: fixed; width: 110px; border-radius: 18px;
      opacity: 0.18; pointer-events: none;
      animation: floatAnim 7s ease-in-out infinite;
    }
    .food-img:nth-child(1){ top:8%;  left:6%;  animation-delay:0s; }
    .food-img:nth-child(2){ top:65%; left:8%;  animation-delay:2s; }
    .food-img:nth-child(3){ top:12%; right:6%; animation-delay:1s; }
    .food-img:nth-child(4){ bottom:8%; right:8%; animation-delay:3s; }
    @keyframes floatAnim {
      0%,100%{ transform: translateY(0) rotate(-2deg); }
      50%{ transform: translateY(-28px) rotate(2deg); }
    }

    /* Login box */
    .login-box {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px;
      background: rgba(20,16,8,0.96);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 20px;
      padding: 42px 38px 34px;
      box-shadow: 0 0 60px rgba(201,168,76,0.1), 0 24px 60px rgba(0,0,0,0.7);
      margin: 16px;
    }

    /* Logo */
    .logo-area { text-align: center; margin-bottom: 30px; }
    .logo-brand {
      font-size: 30px; font-weight: 800;
      letter-spacing: 7px; color: #c9a84c;
      text-transform: uppercase;
    }
    .logo-tag {
      font-size: 10px; color: rgba(201,168,76,0.4);
      letter-spacing: 3px; margin-top: 5px;
      text-transform: uppercase;
    }
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.3), transparent);
      margin: 0 0 28px;
    }

    /* Role selector */
    .role-selector {
      display: flex; gap: 10px; margin-bottom: 22px;
    }
    .role-btn {
      flex: 1; padding: 12px 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 10px; cursor: pointer;
      color: rgba(245,240,232,0.45);
      font-size: 13px; font-weight: 600;
      text-align: center; transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .role-btn .role-icon { font-size: 20px; display: block; margin-bottom: 4px; }
    .role-btn:hover {
      border-color: rgba(201,168,76,0.4);
      color: rgba(245,240,232,0.7);
    }
    .role-btn.active {
      background: rgba(201,168,76,0.12);
      border-color: rgba(201,168,76,0.6);
      color: #c9a84c;
      box-shadow: 0 0 12px rgba(201,168,76,0.1);
    }

    /* Fields */
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 10px;
      letter-spacing: 2px; color: rgba(201,168,76,0.55);
      text-transform: uppercase; margin-bottom: 7px;
    }
    .field input {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 10px; padding: 13px 15px;
      color: rgba(245,240,232,0.9); font-size: 14px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: rgba(201,168,76,0.55);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
    }
    .field input::placeholder { color: rgba(245,240,232,0.25); }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }
    .pw-eye {
      position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: rgba(201,168,76,0.4); font-size: 16px; padding: 4px;
    }
    .pw-eye:hover { color: #c9a84c; }

    /* Login button */
    .login-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #c9a84c 0%, #e8c96e 50%, #c9a84c 100%);
      border: none; border-radius: 11px; cursor: pointer;
      font-size: 13px; font-weight: 800; letter-spacing: 3px;
      color: #1a1208; text-transform: uppercase;
      margin-top: 10px; transition: opacity 0.2s, transform 0.1s;
    }
    .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }
    .login-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* Error */
    .error-msg {
      font-size: 12px; color: #e74c3c;
      text-align: center; margin-top: 14px;
      min-height: 18px; letter-spacing: 0.3px;
    }

    /* Success */
    .success-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.92);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    .success-overlay.show { display: flex; }
    .success-icon { font-size: 56px; animation: popIn 0.4s ease; }
    .success-text { font-size: 18px; color: #c9a84c; font-weight: 700; letter-spacing: 2px; }
    .success-sub { font-size: 13px; color: rgba(245,240,232,0.4); }
    @keyframes popIn {
      0%{ transform: scale(0.5); opacity: 0; }
      70%{ transform: scale(1.15); }
      100%{ transform: scale(1); opacity: 1; }
    }

    /* Shake animation */
    @keyframes shake {
      0%,100%{ transform: translateX(0); }
      20%{ transform: translateX(-8px); }
      40%{ transform: translateX(8px); }
      60%{ transform: translateX(-5px); }
      80%{ transform: translateX(5px); }
    }
    .shake { animation: shake 0.4s ease; }

    .footer {
      text-align: center; margin-top: 22px;
      font-size: 9px; color: rgba(201,168,76,0.2);
      letter-spacing: 2px; text-transform: uppercase;
    }
  </style>
</head>
<body>

<!-- Floating food images -->
<img class="food-img" src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=120" alt="">
<img class="food-img" src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=120" alt="">
<img class="food-img" src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=120" alt="">
<img class="food-img" src="https://images.unsplash.com/photo-1543353071-087092ec393a?w=120" alt="">

<!-- Login Box -->
<div class="login-box" id="loginBox">

  <div class="logo-area">
    <div class="logo-brand">🌿 Siplora</div>
    <div class="logo-tag">Staff Login Portal</div>
  </div>
  <div class="divider"></div>

  <!-- Role Select -->
  <div class="role-selector">
    <div class="role-btn active" id="roleChef" onclick="selectRole('chef')">
      <span class="role-icon">👨‍🍳</span>
      Chef
    </div>
    <div class="role-btn" id="roleCaptain" onclick="selectRole('captain')">
      <span class="role-icon">🧑‍✈️</span>
      Captain
    </div>
  </div>

  <!-- Email -->
  <div class="field">
    <label id="emailLabel">Email Address</label>
    <input type="email" id="emailInput" placeholder="chef@restaurant.com" autocomplete="username"
      onkeydown="if(event.key==='Enter') document.getElementById('passInput').focus()">
  </div>

  <!-- Password -->
  <div class="field">
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="passInput" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doLogin()">
      <button class="pw-eye" onclick="togglePw()" type="button">👁</button>
    </div>
  </div>

  <button class="login-btn" id="loginBtn" onclick="doLogin()">LOGIN →</button>
  <div class="error-msg" id="errMsg"></div>

  <div class="footer">Powered by Siplora &middot; Secure Staff Login</div>
</div>

<!-- Success overlay -->
<div class="success-overlay" id="successOverlay">
  <div class="success-icon" id="successIcon">✅</div>
  <div class="success-text" id="successText">Welcome!</div>
  <div class="success-sub" id="successSub">Redirecting...</div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ── Firebase Init ──────────────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyBsRxWD2R1GkSEM-duLwQe3jAi7yw5vvvM",
  authDomain: "restaurant-system-beec1.firebaseapp.com",
  projectId: "restaurant-system-beec1",
  storageBucket: "restaurant-system-beec1.firebasestorage.app",
  messagingSenderId: "106757122327",
  appId: "1:106757122327:web:723d8dacbba3087b686f52"
});

const auth = firebase.auth();
const db   = firebase.firestore();

// Purana session clear karo
auth.signOut().catch(function(){});

// ── State ──────────────────────────────────────────────────────
var selectedRole = 'chef'; // 'chef' | 'captain'

function selectRole(role) {
  selectedRole = role;
  document.getElementById('roleChef').classList.toggle('active', role === 'chef');
  document.getElementById('roleCaptain').classList.toggle('active', role === 'captain');
  document.getElementById('emailLabel').textContent = role === 'chef' ? 'Email Address' : 'Email Address';
  document.getElementById('emailInput').placeholder = role === 'chef'
    ? 'chef@restaurant.com'
    : 'captain@restaurant.com';
  document.getElementById('errMsg').textContent = '';
}

function togglePw() {
  var inp = document.getElementById('passInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function showErr(msg) {
  document.getElementById('errMsg').textContent = msg;
  var box = document.getElementById('loginBox');
  box.classList.remove('shake');
  void box.offsetWidth; // reflow
  box.classList.add('shake');
  setTimeout(function(){ box.classList.remove('shake'); }, 420);
  var btn = document.getElementById('loginBtn');
  btn.disabled = false;
  btn.textContent = 'LOGIN →';
}

// ── MAIN LOGIN FUNCTION ────────────────────────────────────────
async function doLogin() {
  var email    = document.getElementById('emailInput').value.trim();
  var password = document.getElementById('passInput').value.trim();
  var btn      = document.getElementById('loginBtn');

  document.getElementById('errMsg').textContent = '';

  if (!email)    { showErr('❌ Email daalo'); return; }
  if (!password) { showErr('❌ Password daalo'); return; }

  btn.disabled = true;
  btn.textContent = 'Checking...';

  try {
    // ── Step 1: Firebase Auth se login ──────────────────────
    var userCred = await auth.signInWithEmailAndPassword(email, password);
    var uid = userCred.user.uid;

    // ── Step 2: Firestore mein users/{uid} check karo ───────
    // chef-captain-auth-fix.js ne yahan role + restaurantId save kiya tha
    var userDoc = await db.collection('users').doc(uid).get();

    var role         = null;
    var restaurantId = null;
    var name         = '';

    if (userDoc.exists) {
      var data = userDoc.data();
      role         = data.role         || null;
      restaurantId = data.restaurantId || null;
      name         = data.name         || '';
    }

    // ── Step 3: Agar users/ mein nahi mila — cc_chefs/captains se dhundo ──
    if (!role || !restaurantId) {
      if (selectedRole === 'chef') {
        var chefSnap = await db.collection('cc_chefs')
          .where('email', '==', email).limit(1).get();
        if (!chefSnap.empty) {
          var cd = chefSnap.docs[0].data();
          role         = 'chef';
          restaurantId = cd.restaurantId || null;
          name         = cd.name || '';
        }
      } else {
        // Captain — username se dhundo (email ya username@siplora-captain.local format)
        var capEmail = email.includes('@siplora-captain.local') ? email : email;
        var capSnap  = await db.collection('captains')
          .where('username', '==', email).limit(1).get();
        // Agar username se nahi mila to email se try karo
        if (capSnap.empty) {
          capSnap = await db.collection('captains')
            .where('email', '==', email).limit(1).get();
        }
        if (!capSnap.empty) {
          var capd = capSnap.docs[0].data();
          role         = 'captain';
          restaurantId = capd.restaurantId || null;
          name         = capd.name || '';
        }
      }
    }

    // ── Step 4: Role mismatch check ─────────────────────────
    if (role && role !== selectedRole) {
      await auth.signOut();
      showErr('❌ Aap ' + role + ' hain — upar ' +
        (role === 'chef' ? 'Chef' : 'Captain') + ' select karo');
      return;
    }

    if (!role) {
      await auth.signOut();
      showErr('❌ Account nahi mila — billing panel se pehle add karo');
      return;
    }

    if (!restaurantId) {
      await auth.signOut();
      showErr('❌ Restaurant assign nahi hai — owner se contact karo');
      return;
    }

    // ── Step 5: Session save karo ────────────────────────────
    sessionStorage.setItem('siplora_staff_session', JSON.stringify({
      uid          : uid,
      email        : email,
      role         : role,
      restaurantId : restaurantId,
      name         : name,
      loginAt      : Date.now()
    }));

    // Captain ke liye restaurantId localStorage mein bhi save karo
    if (role === 'captain') {
      localStorage.setItem('captain_restaurant_id', restaurantId);
    }

    // ── Step 6: Success screen dikhao phir redirect ──────────
    var overlay = document.getElementById('successOverlay');
    document.getElementById('successIcon').textContent  = role === 'chef' ? '👨‍🍳' : '🧑‍✈️';
    document.getElementById('successText').textContent  = 'Welcome, ' + (name || (role === 'chef' ? 'Chef' : 'Captain')) + '!';
    document.getElementById('successSub').textContent   = restaurantId + ' → ' + (role === 'chef' ? 'Chef Panel' : 'Captain Panel');
    overlay.classList.add('show');

    // 1.5 second baad redirect
    setTimeout(function() {
      if (role === 'chef') {
        window.location.href = 'chef.html?rid=' + encodeURIComponent(restaurantId);
      } else {
        window.location.href = 'captain.html?rid=' + encodeURIComponent(restaurantId);
      }
    }, 1500);

  } catch(err) {
    var code = err.code || '';
    if      (code === 'auth/user-not-found')    showErr('❌ Ye email registered nahi hai');
    else if (code === 'auth/wrong-password')     showErr('❌ Password galat hai');
    else if (code === 'auth/invalid-credential') showErr('❌ Email ya password galat hai');
    else if (code === 'auth/invalid-email')      showErr('❌ Email format sahi nahi');
    else if (code === 'auth/too-many-requests')  showErr('❌ Bahut attempts — thodi der baad try karo');
    else                                         showErr('❌ ' + (err.message || code));
  }
}
</script>
</body>
</html>
