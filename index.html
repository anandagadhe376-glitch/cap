<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siplora — Staff Login</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1208 50%, #0d0d0d 100%);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    .food-img {
      position: fixed; width: 110px; border-radius: 18px;
      opacity: 0.15; pointer-events: none;
      animation: floatAnim 7s ease-in-out infinite;
    }
    .food-img:nth-child(1){ top:8%;  left:6%;  animation-delay:0s; }
    .food-img:nth-child(2){ top:65%; left:8%;  animation-delay:2s; }
    .food-img:nth-child(3){ top:12%; right:6%; animation-delay:1s; }
    .food-img:nth-child(4){ bottom:8%; right:8%; animation-delay:3s; }
    @keyframes floatAnim {
      0%,100%{ transform: translateY(0) rotate(-2deg); }
      50%{ transform: translateY(-28px) rotate(2deg); }
    }

    .login-box {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px;
      background: rgba(20,16,8,0.96);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 20px;
      padding: 42px 38px 34px;
      box-shadow: 0 0 60px rgba(201,168,76,0.1), 0 24px 60px rgba(0,0,0,0.7);
      margin: 16px;
    }

    .logo-area { text-align: center; margin-bottom: 30px; }
    .logo-brand {
      font-size: 30px; font-weight: 800;
      letter-spacing: 7px; color: #c9a84c;
      text-transform: uppercase;
    }
    .logo-tag {
      font-size: 10px; color: rgba(201,168,76,0.4);
      letter-spacing: 3px; margin-top: 5px;
      text-transform: uppercase;
    }
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.3), transparent);
      margin: 0 0 28px;
    }

    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 10px;
      letter-spacing: 2px; color: rgba(201,168,76,0.55);
      text-transform: uppercase; margin-bottom: 7px;
    }
    .field input {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 10px; padding: 13px 15px;
      color: rgba(245,240,232,0.9); font-size: 14px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: rgba(201,168,76,0.55);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
    }
    .field input::placeholder { color: rgba(245,240,232,0.25); }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }
    .pw-eye {
      position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: rgba(201,168,76,0.4); font-size: 16px; padding: 4px;
    }
    .pw-eye:hover { color: #c9a84c; }

    .login-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #c9a84c 0%, #e8c96e 50%, #c9a84c 100%);
      border: none; border-radius: 11px; cursor: pointer;
      font-size: 13px; font-weight: 800; letter-spacing: 3px;
      color: #1a1208; text-transform: uppercase;
      margin-top: 10px; transition: opacity 0.2s, transform 0.1s;
    }
    .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .login-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .error-msg {
      font-size: 12px; color: #e74c3c;
      text-align: center; margin-top: 14px;
      min-height: 18px; letter-spacing: 0.3px;
    }

    /* Success overlay */
    .success-overlay {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.93);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
    }
    .success-overlay.show { display: flex; }
    .success-icon { font-size: 60px; animation: popIn 0.4s ease; }
    .success-name { font-size: 20px; color: #c9a84c; font-weight: 800; letter-spacing: 2px; }
    .success-role { font-size: 13px; color: rgba(245,240,232,0.5); letter-spacing: 1px; }
    .success-rest { font-size: 11px; color: rgba(201,168,76,0.4); margin-top: 4px; }
    @keyframes popIn {
      0%{ transform: scale(0.5); opacity: 0; }
      70%{ transform: scale(1.15); }
      100%{ transform: scale(1); opacity: 1; }
    }

    @keyframes shake {
      0%,100%{ transform: translateX(0); }
      20%{ transform: translateX(-8px); }
      40%{ transform: translateX(8px); }
      60%{ transform: translateX(-5px); }
      80%{ transform: translateX(5px); }
    }
    .shake { animation: shake 0.4s ease; }

    .footer {
      text-align: center; margin-top: 22px;
      font-size: 9px; color: rgba(201,168,76,0.2);
      letter-spacing: 2px; text-transform: uppercase;
    }
  </style>
</head>
<body>

<img class="food-img" src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=120" alt="">
<img class="food-img" src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=120" alt="">
<img class="food-img" src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=120" alt="">
<img class="food-img" src="https://images.unsplash.com/photo-1543353071-087092ec393a?w=120" alt="">

<div class="login-box" id="loginBox">
  <div class="logo-area">
    <div class="logo-brand">🌿 Siplora</div>
    <div class="logo-tag">Staff Login Portal</div>
  </div>
  <div class="divider"></div>

  <div class="field">
    <label>Email Address</label>
    <input type="email" id="emailInput" placeholder="chef@restaurant.com"
      autocomplete="username"
      onkeydown="if(event.key==='Enter') document.getElementById('passInput').focus()">
  </div>

  <div class="field">
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="passInput" placeholder="••••••••"
        autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doLogin()">
      <button class="pw-eye" onclick="togglePw()" type="button">👁</button>
    </div>
  </div>

  <button class="login-btn" id="loginBtn" onclick="doLogin()">LOGIN →</button>
  <div class="error-msg" id="errMsg"></div>
  <div class="footer">Powered by Siplora &middot; Secure Staff Login</div>
</div>

<!-- Success Screen -->
<div class="success-overlay" id="successOverlay">
  <div class="success-icon" id="sIcon">✅</div>
  <div class="success-name" id="sName">Welcome!</div>
  <div class="success-role" id="sRole">Redirecting...</div>
  <div class="success-rest" id="sRest"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ── Firebase Init ──────────────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyBsRxWD2R1GkSEM-duLwQe3jAi7yw5vvvM",
  authDomain: "restaurant-system-beec1.firebaseapp.com",
  projectId: "restaurant-system-beec1",
  storageBucket: "restaurant-system-beec1.firebasestorage.app",
  messagingSenderId: "106757122327",
  appId: "1:106757122327:web:723d8dacbba3087b686f52"
});

const auth = firebase.auth();
const db   = firebase.firestore();

// Purana session clear
auth.signOut().catch(function(){});

function togglePw() {
  var inp = document.getElementById('passInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function showErr(msg) {
  document.getElementById('errMsg').textContent = msg;
  var btn = document.getElementById('loginBtn');
  btn.disabled = false;
  btn.textContent = 'LOGIN →';
  var box = document.getElementById('loginBox');
  box.classList.remove('shake');
  void box.offsetWidth;
  box.classList.add('shake');
  setTimeout(function(){ box.classList.remove('shake'); }, 420);
}

// ── MAIN LOGIN ─────────────────────────────────────────────────
async function doLogin() {
  var email    = (document.getElementById('emailInput').value || '').trim();
  var password = (document.getElementById('passInput').value  || '').trim();
  var btn      = document.getElementById('loginBtn');

  document.getElementById('errMsg').textContent = '';

  if (!email)    { showErr('❌ Email daalo'); return; }
  if (!password) { showErr('❌ Password daalo'); return; }

  btn.disabled = true;
  btn.textContent = 'Checking...';

  try {

    // ── STEP 1: Firebase Auth login ────────────────────────
    var userCred = await auth.signInWithEmailAndPassword(email, password);
    var uid      = userCred.user.uid;
    console.log('[Login] Firebase Auth OK — UID:', uid);

    // ── STEP 2: Firestore users/{uid} se role + restaurantId lo ──
    var role         = null;
    var restaurantId = null;
    var name         = '';

    var userSnap = await db.collection('users').doc(uid).get();
    if (userSnap.exists) {
      var ud   = userSnap.data();
      role         = ud.role         || null;
      restaurantId = ud.restaurantId || null;
      name         = ud.name         || '';
      console.log('[Login] users/ mein mila — role:', role, '| rid:', restaurantId);
    }

    // ── STEP 3: users/ mein nahi mila — cc_chefs se dhundo ──
    if (!role || !restaurantId) {
      console.log('[Login] users/ mein nahi mila — cc_chefs check...');
      var chefSnap = await db.collection('cc_chefs')
        .where('email', '==', email)
        .limit(1).get();

      if (!chefSnap.empty) {
        var cd       = chefSnap.docs[0].data();
        role         = 'chef';
        restaurantId = cd.restaurantId || null;
        name         = cd.name         || '';
        console.log('[Login] cc_chefs mein mila — rid:', restaurantId);
      }
    }

    // ── STEP 4: cc_chefs mein bhi nahi — captains se dhundo ──
    if (!role || !restaurantId) {
      console.log('[Login] cc_chefs mein nahi — captains check...');

      // Pehle email se try karo
      var capSnap = await db.collection('captains')
        .where('email', '==', email).limit(1).get();

      // Email nahi mila — username se try karo
      if (capSnap.empty) {
        capSnap = await db.collection('captains')
          .where('username', '==', email).limit(1).get();
      }

      // Username@siplora-captain.local format try karo
      if (capSnap.empty) {
        var localEmail = email.replace('@siplora-captain.local', '');
        capSnap = await db.collection('captains')
          .where('username', '==', localEmail).limit(1).get();
      }

      if (!capSnap.empty) {
        var capd     = capSnap.docs[0].data();
        role         = 'captain';
        restaurantId = capd.restaurantId || null;
        name         = capd.name         || '';
        console.log('[Login] captains mein mila — rid:', restaurantId);
      }
    }

    // ── STEP 5: Role nahi mila ────────────────────────────
    if (!role) {
      await auth.signOut();
      showErr('❌ Staff account nahi mila — billing panel se pehle add karo');
      return;
    }

    // ── STEP 6: RestaurantId nahi mili ───────────────────
    if (!restaurantId) {
      await auth.signOut();
      showErr('❌ Restaurant assign nahi — owner se contact karo');
      return;
    }

    // ── STEP 7: Session save ──────────────────────────────
    sessionStorage.setItem('siplora_staff', JSON.stringify({
      uid, email, role, restaurantId, name, loginAt: Date.now()
    }));

    if (role === 'captain') {
      localStorage.setItem('captain_restaurant_id', restaurantId);
    }

    // ── STEP 8: Success screen ────────────────────────────
    document.getElementById('sIcon').textContent = role === 'chef' ? '👨‍🍳' : '🧑‍✈️';
    document.getElementById('sName').textContent = 'Welcome, ' + (name || (role === 'chef' ? 'Chef' : 'Captain')) + '!';
    document.getElementById('sRole').textContent = role === 'chef' ? 'Chef Panel' : 'Captain Panel';
    document.getElementById('sRest').textContent = 'Restaurant: ' + restaurantId;
    document.getElementById('successOverlay').classList.add('show');

    // ── STEP 9: Redirect ──────────────────────────────────
    setTimeout(function() {
      if (role === 'chef') {
        window.location.href = 'chef.html?rid=' + encodeURIComponent(restaurantId);
      } else {
        window.location.href = 'captain.html?rid=' + encodeURIComponent(restaurantId);
      }
    }, 1500);

  } catch(err) {
    var code = err.code || '';
    console.error('[Login] Error:', code, err.message);
    if      (code === 'auth/user-not-found')    showErr('❌ Ye email registered nahi hai');
    else if (code === 'auth/wrong-password')     showErr('❌ Password galat hai');
    else if (code === 'auth/invalid-credential') showErr('❌ Email ya password galat hai');
    else if (code === 'auth/invalid-email')      showErr('❌ Email format sahi nahi');
    else if (code === 'auth/too-many-requests')  showErr('❌ Bahut attempts — kuch der baad try karo');
    else                                         showErr('❌ ' + (err.message || code));
  }
}
</script>
</body>
</html>
